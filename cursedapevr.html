<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURSED APE VR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0000;
            color: #ff0000;
            font-family: 'Creepster', cursive;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .background {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #220000 0%, #000000 70%);
            z-index: -2;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(255, 0, 0, 0.08) 2px,
                rgba(255, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 1;
            animation: flicker 0.15s infinite alternate;
        }

        .content {
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .title {
            font-size: 92px;
            letter-spacing: 8px;
            text-shadow: 
                0 0 20px #ff0000,
                0 0 40px #ff0000,
                0 0 80px #8b0000;
            margin-bottom: 20px;
            animation: glitch 1.5s infinite;
        }

        .monkey {
            width: 380px;
            height: 380px;
            margin: 0 auto 30px;
            background: url('https://media.discordapp.net/attachments/1493387805848764456/1495518992113074236/JDSEJ.webp?ex=69e68a19&is=69e53899&hm=8b2f24c371bc68bfc3b0f9b858d968535c51ffc58a24d1087f7973448a864c25&animated=true') center/cover no-repeat; /* your monkey image */
            border: 8px solid #ff0000;
            box-shadow: 
                0 0 60px #ff0000,
                inset 0 0 80px #000;
            filter: contrast(1.4) brightness(0.8);
            animation: pulse 2s infinite alternate;
        }

        .subtitle {
            font-size: 28px;
            color: #aa0000;
            text-shadow: 0 0 15px #ff0000;
            margin-top: 10px;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(-4px, -4px); }
            60% { transform: translate(4px, 4px); }
            80% { transform: translate(4px, -4px); }
            100% { transform: translate(0); }
        }

        @keyframes pulse {
            from { transform: scale(0.95); filter: contrast(1.2) brightness(0.7); }
            to { transform: scale(1.05); filter: contrast(1.6) brightness(1.1); }
        }

        @keyframes flicker {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .warning {
            position: absolute;
            bottom: 40px;
            font-size: 18px;
            color: #ff4444;
            animation: flicker 0.8s infinite;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="scanlines"></div>

    <div class="content">
        <div class="title">CURSED APE VR</div>
        
        <div class="monkey"></div>
        
        <div class="subtitle">DON'T LOOK BACK</div>
        <div class="subtitle" style="margin-top: -10px; font-size: 22px;">DON'T LOOK AWAY</div>
    </div>

    <div class="warning">● ● ● GAME SOON... ● ● ●</div>

    <script>
        // Subtle random glitch effect on title
        setInterval(() => {
            const title = document.querySelector('.title');
            if (Math.random() > 0.7) {
                title.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
                setTimeout(() => title.style.transform = 'translate(0)', 80);
            }
        }, 300);
    </script>
</body>
</html>
